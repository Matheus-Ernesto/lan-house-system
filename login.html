<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanHouseSystem - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional custom styles to complement Tailwind and maintain theme */
        body {
            background-color: black;
        }

        .header-hover-shadow {
            transition: text-shadow 0.3s ease, transform 0.3s ease;

            .header-hover-shadow:hover {
                text-shadow: 0 0 8px rgba(255, 215, 175, 0.6);
                transform: scale(1.01);
            }

            .nav-link {
                position: relative;
            }

            .nav-link::after {
                content: '';
                position: absolute;
                bottom: -4px;
                left: 0;
                width: 0%;
                height: 1.5px;
                background-color: #c9a87b;
                transition: width 0.25s ease;
            }

            .nav-link:hover::after {
                width: 100%;
            }

            /* Custom scrollbar to match rustic theme */
            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #1e1e1e;
            }

            ::-webkit-scrollbar-thumb {
                background: #5a3e2e;
                border-radius: 4px;
            }

            input:focus {
                outline: none;
                border-color: #c9a87b;
                box-shadow: 0 0 0 2px rgba(201, 168, 123, 0.3);
            }
    </style>
</head>

<body class="bg-black m-0 p-0">
    <header class="h-[30vh] min-h-[160px] w-full bg-[#2c1810] flex items-center px-6 md:px-12 lg:px-20">
        <div class="header-container max-w-7xl mx-auto w-full">
            <h1 class="header-hover-shadow text-white text-3xl sm:text-4xl md:text-5xl tracking-wide cursor-default transition-all duration-300"
                style="font-family: 'Raleway-Light', 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 300;">
                Lan House System
            </h1>
            <nav class="flex gap-6 md:gap-8 items-center">
                <a href="index.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    HOME
                </a>
                <a href="agendar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    AGENDAR
                </a>
                <a href="anunciar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ANUNCIE
                </a>
                <a href="comps.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    COMPS
                </a>
                <a href="login.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ENTRAR
                </a>
            </nav>
        </div>
    </header>

    <!-- Login Section: two columns (image left, form right) with same background as header -->
    <section
        class="w-full bg-[#2c1810] py-16 px-4 md:px-12 lg:px-20 flex flex-col md:flex-row items-center justify-center gap-12 md:gap-16">
        <!-- Left side: Image with rounded corners, fixed dimensions (30vw width, 80vh max-height) -->
        <div class="w-full md:w-[30vw] max-w-[400px] md:max-w-[30vw] flex justify-center">
            <img src="assets/19.jpg" alt="Gaming setup"
                class="rounded-2xl shadow-2xl object-cover w-full h-auto md:h-[80vh] max-h-[500px] md:max-h-[80vh] border-2 border-amber-800/40"
                onerror="this.onerror=null; this.src='https://placehold.co/800x1000/3a251c/ccaa88?text=Lan+House+Ambience';">
        </div>

        <!-- Right side: Login Form Card with proper spacing & theme -->
        <div
            class="w-full md:w-[40%] max-w-md bg-[#1f130c] rounded-2xl p-8 md:p-10 shadow-2xl border border-amber-800/30">
            <h2 class="text-white text-4xl md:text-5xl mb-8 text-center tracking-wide"
                style="font-family: 'Rationale-Regular', 'Courier New', monospace;">
                Login
            </h2>

            <div class="space-y-5">
                <!-- Email Field -->
                <div>
                    <label class="block text-amber-200 text-base md:text-lg mb-2 font-medium"
                        style="font-family: 'Rationale-Regular', 'Courier New', monospace;">
                        Email
                    </label>
                    <input type="email" name="email" id="login-email" placeholder="seu@email.com"
                        class="w-full bg-[#2c1a12] border border-amber-700/60 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-amber-500 transition-all duration-200"
                        style="font-family: 'Segoe UI', system-ui, sans-serif;">
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-amber-200 text-base md:text-lg mb-2 font-medium"
                        style="font-family: 'Rationale-Regular', 'Courier New', monospace;">
                        Senha
                    </label>
                    <input type="password" name="password" id="login-password" placeholder="••••••••"
                        class="w-full bg-[#2c1a12] border border-amber-700/60 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-amber-500 transition-all duration-200">
                </div>

                <!-- Forgot password link -->
                <div class="text-right">
                    <a href="#" class="text-amber-400 hover:text-amber-300 text-sm transition-colors duration-200"
                        style="font-family: 'Rationale-Regular', 'Courier New', monospace;">
                        Esqueci minha senha.
                    </a>
                </div>

                <!-- Main Login Button -->
                <button id="login-btn"
                    class="w-full bg-white text-[#2c1810] hover:bg-gray-100 font-bold py-3.5 px-6 rounded-full transition-all duration-300 text-xl shadow-xl hover:scale-[1.02] active:scale-95 mt-4"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace;">
                    Entrar
                </button>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-amber-800/40"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-3 bg-[#1f130c] text-amber-400/70" style="font-family: monospace;">ou</span>
                    </div>
                </div>

                <!-- Create account button (secondary action) -->
                <div class="text-center">
                    <button id="signup-redirect"
                        class="w-full bg-transparent border-2 border-amber-600/60 text-amber-200 hover:bg-amber-800/30 hover:border-amber-500 font-semibold py-3 px-6 rounded-full transition-all duration-300 text-lg"
                        style="font-family: 'Rationale-Regular', 'Courier New', monospace;">
                        Não tenho uma conta ainda.
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer class="w-full bg-[#1e1e1e] h-auto py-12 flex items-center justify-center px-6 text-center">
        <p class="text-gray-400 text-sm md:text-base font-sans tracking-wide">
            UNIFECAF - 2026, TODOS OS DIREITOS RESERVADOS. - PROJETO EXCLUSIVAMENTE DEMONSTRATIVO E ACADÊMICO.
        </p>
    </footer>

    <script>
        // Simple interactive demo to match the academic purpose (no backend, just UI alerts/feedback)
        (function () {
            const loginBtn = document.getElementById('login-btn');
            const emailInput = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const signupBtn = document.getElementById('signup-redirect');
            const forgotLink = document.querySelector('a[href="#"]'); // forgot password link

            // Helper: simple validation for demo
            function showMessage(msg, isError = true) {
                // Create temporary floating message or alert (non-intrusive, but visible)
                // We'll use a subtle alert for demonstration (academic project)
                // But also create a temporary toast-like element for better UX
                const existingToast = document.querySelector('.demo-toast');
                if (existingToast) existingToast.remove();

                const toast = document.createElement('div');
                toast.className = 'demo-toast fixed bottom-28 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-lg shadow-lg transition-all duration-300 text-sm font-mono';
                toast.style.backgroundColor = isError ? '#7a2e2e' : '#2c5a2e';
                toast.style.color = '#f5e6d3';
                toast.style.borderLeft = `4px solid ${isError ? '#e0a878' : '#b0d68a'}`;
                toast.innerText = msg;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2800);
            }

            // Login action
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                if (!email) {
                    showMessage('Por favor, informe o email.', true);
                    emailInput.focus();
                    return;
                }
                if (!password) {
                    showMessage('Por favor, informe a senha.', true);
                    passwordInput.focus();
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    showMessage('Email inválido. Exemplo: usuario@dominio.com', true);
                    return;
                }

                // Demo successful login simulation (academic context)
                // Demo successful login simulation (academic context)
                showMessage(`Bem-vindo(a), ${email.split('@')[0]}!`, false);
                // Redirecionar para a página da conta após login bem-sucedido
                setTimeout(() => {
                    window.location.href = 'conta.html';
                }, 500); // Pequeno atraso para mostrar a mensagem antes do redirecionamento
            });

            // Forgot password link action
            if (forgotLink) {
                forgotLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    showMessage('🔐 Instruções de recuperação enviadas para o email cadastrado (demonstração).', false);
                });
            }

            // Create account button: redirect or show demo message
            signupBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // Provide a friendly demo notice and simulate redirection to "agendar.html" or similar? But we keep generic.
                showMessage('📝 Criar nova conta: funcionalidade em desenvolvimento (projeto acadêmico).', false);
                // Optionally redirect to a register page if existed, but not required.
                // Since not specified, we just demonstrate feedback.
            });

            // Support "Enter" key on form fields to trigger login
            const inputs = [emailInput, passwordInput];
            inputs.forEach(input => {
                if (input) {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            loginBtn.click();
                        }
                    });
                }
            });
        })();
    </script>
</body>

</html>
