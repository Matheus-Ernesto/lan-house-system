    <script>
        //EXEMPLO DE CARROSSEL
        // Simple carousel functionality (preserved exactly as originally intended, but corrected selectors)
        // NOTE: original script had querySelectorAll('.section > div') which doesn't match structure.
        // Fixing to target the actual slide divs inside the carousel section.
        const carouselSection = document.querySelector('section.relative.w-screen.h-\\[80vh\\]');
        if (carouselSection) {
            const slides = carouselSection.querySelectorAll('.absolute.inset-0.w-full.h-full.bg-cover');
            const dots = document.querySelectorAll('[data-slide]');
            let currentSlide = 0;
            let autoPlayInterval;

            function showSlide(index) {
                if (!slides.length) return;
                slides.forEach((slide, i) => {
                    slide.style.opacity = i === index ? '1' : '0';
                });
                currentSlide = index;
                // update dots active state (optional visual enhancement)
                dots.forEach((dot, idx) => {
                    if (idx === index) {
                        dot.classList.add('bg-white');
                        dot.classList.remove('bg-white/50');
                    } else {
                        dot.classList.remove('bg-white');
                        dot.classList.add('bg-white/50');
                    }
                });
            }

            function nextSlide() {
                if (!slides.length) return;
                currentSlide = (currentSlide + 1) % slides.length;
                showSlide(currentSlide);
            }

            // Dot click handlers
            if (dots.length) {
                dots.forEach((dot, idx) => {
                    dot.addEventListener('click', () => {
                        showSlide(idx);
                        resetAutoPlay();
                    });
                });
            }

            function resetAutoPlay() {
                if (autoPlayInterval) clearInterval(autoPlayInterval);
                autoPlayInterval = setInterval(nextSlide, 5000);
            }

            // Start autoplay if slides exist
            if (slides.length) {
                autoPlayInterval = setInterval(nextSlide, 5000);
                // Pause on hover for carousel section
                carouselSection.addEventListener('mouseenter', () => {
                    if (autoPlayInterval) clearInterval(autoPlayInterval);
                });
                carouselSection.addEventListener('mouseleave', () => {
                    autoPlayInterval = setInterval(nextSlide, 5000);
                });
                // set initial active dot style
                showSlide(0);
            }
        } else {
            // fallback in case structure differs: try generic approach but keep original spirit
            const slidesAlt = document.querySelectorAll('.absolute.inset-0.w-full.h-full.bg-cover');
            const dotsAlt = document.querySelectorAll('[data-slide]');
            if (slidesAlt.length && dotsAlt.length) {
                let altCurrent = 0;
                let altInterval = setInterval(() => {
                    altCurrent = (altCurrent + 1) % slidesAlt.length;
                    slidesAlt.forEach((s, idx) => {
                        s.style.opacity = idx === altCurrent ? '1' : '0';
                    });
                }, 5000);
                dotsAlt.forEach((dot, i) => {
                    dot.addEventListener('click', () => {
                        altCurrent = i;
                        slidesAlt.forEach((s, idx) => {
                            s.style.opacity = idx === altCurrent ? '1' : '0';
                        });
                        clearInterval(altInterval);
                        altInterval = setInterval(() => {
                            altCurrent = (altCurrent + 1) % slidesAlt.length;
                            slidesAlt.forEach((s, idx) => {
                                s.style.opacity = idx === altCurrent ? '1' : '0';
                            });
                        }, 5000);
                    });
                });
            }
        }
    </script>
