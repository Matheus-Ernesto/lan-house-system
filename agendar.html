<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanHouseSystem - Agendar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional custom styles to complement Tailwind and maintain theme */
        body {
            background-color: black;
        }

        .header-hover-shadow {
            transition: text-shadow 0.3s ease, transform 0.3s ease;
        }

        .header-hover-shadow:hover {
            text-shadow: 0 0 8px rgba(255, 215, 175, 0.6);
            transform: scale(1.01);
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1.5px;
            background-color: #c9a87b;
            transition: width 0.25s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #5a3e2e;
            border-radius: 4px;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: none;
            border-color: #c9a87b;
            box-shadow: 0 0 0 2px rgba(201, 168, 123, 0.3);
        }

        /* custom card image aspect */
        .card-img {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }

        .loading-spinner {
            border: 3px solid #2a2a2a;
            border-top: 3px solid #c9a87b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background-color: rgba(220, 38, 38, 0.1);
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body class="bg-black m-0 p-0">
    <header class="h-[30vh] min-h-[160px] w-full bg-[#2c1810] flex items-center px-6 md:px-12 lg:px-20">
        <div class="header-container max-w-7xl mx-auto w-full">
            <h1 class="header-hover-shadow text-white text-3xl sm:text-4xl md:text-5xl tracking-wide cursor-default transition-all duration-300"
                style="font-family: 'Raleway-Light', 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 300;">
                Lan House System
            </h1>
            <nav class="flex gap-6 md:gap-8 items-center">
                <a href="index.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    HOME
                </a>
                <a href="agendar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    AGENDAR
                </a>
                <a href="anunciar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ANUNCIE
                </a>
                <a href="comps.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    COMPS
                </a>
                <a href="login.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ENTRAR
                </a>
            </nav>
        </div>
    </header>

    <!-- Main content: two columns (filter sidebar + results grid) -->
    <main class="max-w-7xl mx-auto px-4 md:px-8 py-12 flex flex-col lg:flex-row gap-8">
        <!-- LEFT SIDEBAR - FILTERS (width: 30vw on large screens, but responsive) -->
        <aside class="w-full lg:w-[30%] bg-[#0c0c0c] rounded-2xl p-6 border border-[#2a2a2a] shadow-xl h-auto">
            <h3 class="text-2xl text-white mb-6 border-l-4 border-[#c9a87b] pl-4"
                style="font-family: 'Rationale-Regular', 'Courier New', monospace;">Filtros</h3>

            <!-- Tipo de agendamento (mapeamento: 0=Todos, 1=Profissional, 2=Amador, 3=Corujão, 4=Outros) -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Tipo de agendamento</label>
                <select id="typeFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200">
                    <option value="">Todos os tipos</option>
                    <option value="1">Times profissionais (+6 pessoas obrigatório)</option>
                    <option value="2">Times amadores (+5 pessoas obrigatório)</option>
                    <option value="3">Amigos para corujão ou jogatinas (+4 pessoas obrigatório)</option>
                    <option value="4">Outros (Entrar em equipes, Jogar sozinho ou em menos de 4 pessoas)</option>
                </select>
            </div>

            <!-- Data (não implementado na API, mantido para futuro) -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Data</label>
                <input type="date" id="dateFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200" value="">
            </div>

            <!-- Região (Estado + Cidade) -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Região</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <select id="stateFilter"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-full sm:w-1/2">
                        <option value="">Estado</option>
                    </select>
                    <select id="cityFilter"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-full sm:w-1/2">
                        <option value="">Cidade</option>
                    </select>
                </div>
            </div>

            <!-- Preço (min/max) -->
            <div class="mb-8">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Preço (R$/hora)</label>
                <div class="flex gap-3">
                    <select id="priceMin"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-1/2">
                        <option value="0">Mínimo</option>
                        <option value="5">R$ 5</option>
                        <option value="10">R$ 10</option>
                        <option value="15">R$ 15</option>
                        <option value="20">R$ 20</option>
                        <option value="25">R$ 25</option>
                    </select>
                    <select id="priceMax"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-1/2">
                        <option value="999">Máximo</option>
                        <option value="10">R$ 10</option>
                        <option value="15">R$ 15</option>
                        <option value="20">R$ 20</option>
                        <option value="25">R$ 25</option>
                        <option value="30">R$ 30</option>
                        <option value="50">R$ 50</option>
                    </select>
                </div>
            </div>

            <button id="searchBtn"
                class="w-full bg-[#2c1810] hover:bg-[#4a2c1c] text-white font-semibold py-3 rounded-full transition-all duration-200 shadow-md">Pesquisar</button>
        </aside>

        <!-- RIGHT SIDE - RESULTS GRID -->
        <section class="w-full lg:w-[70%]">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <h3 class="text-2xl text-white" style="font-family: 'Rationale-Regular', 'Courier New', monospace;">Lan
                    houses disponíveis</h3>
                <span id="resultsCount" class="bg-[#2c1810] text-amber-200 px-4 py-1.5 rounded-full text-sm font-bold">0
                    estabelecimentos</span>
            </div>
            <div id="lanHousesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- dynamic cards will appear here -->
                <div class="col-span-full">
                    <div class="loading-spinner"></div>
                    <p class="text-center text-gray-400">Carregando lan houses...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="w-full bg-[#1e1e1e] h-auto py-12 flex items-center justify-center px-6 text-center">
        <p class="text-gray-400 text-sm md:text-base font-sans tracking-wide">
            UNIFECAF - 2026, TODOS OS DIREITOS RESERVADOS. - PROJETO EXCLUSIVAMENTE DEMONSTRATIVO E ACADÊMICO.
        </p>
    </footer>

    <script>
        // Configuração da API
        const API_BASE_URL = 'http://localhost:8000'; // Altere para o endereço da sua API

        // Variáveis globais
        let estadosList = [];
        let lanHousesData = [];

        // Helper: Mapeamento de tipo para texto
        function getTipoTexto(tipo) {
            const tipos = {
                1: "Profissional",
                2: "Amador",
                3: "Corujão",
                4: "Outros"
            };
            return tipos[tipo] || "Não especificado";
        }

        // Helper: Carregar estados da API
        async function loadEstados() {
            try {
                const response = await fetch(`${API_BASE_URL}/estados`);
                if (!response.ok) throw new Error('Erro ao carregar estados');
                const data = await response.json();
                estadosList = data.estados;
                
                const stateSelect = document.getElementById('stateFilter');
                stateSelect.innerHTML = '<option value="">Estado</option>';
                
                estadosList.forEach(estado => {
                    const option = document.createElement('option');
                    option.value = estado.id;
                    option.textContent = estado.nome;
                    stateSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar estados:', error);
                showError('Erro ao carregar lista de estados');
            }
        }

        // Helper: Carregar cidades baseado no estado selecionado
        async function loadCidades(estadoId) {
            try {
                const url = estadoId ? `${API_BASE_URL}/cidades?estado_id=${estadoId}` : `${API_BASE_URL}/cidades`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Erro ao carregar cidades');
                const data = await response.json();
                
                const citySelect = document.getElementById('cityFilter');
                citySelect.innerHTML = '<option value="">Cidade</option>';
                
                // Para filtrar cidades localmente (já que a API retorna todas com estado_nome)
                const cidadesFiltradas = estadoId ? data.cidades.filter(c => c.estado_id === estadoId) : data.cidades;
                
                cidadesFiltradas.forEach(cidade => {
                    const option = document.createElement('option');
                    option.value = cidade.id;
                    option.textContent = cidade.nome;
                    citySelect.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar cidades:', error);
            }
        }

        // Helper: Carregar lan houses da API com filtros
        async function loadLanHouses(filters = {}) {
            try {
                // Mostrar loading
                const gridContainer = document.getElementById('lanHousesGrid');
                gridContainer.innerHTML = `
                    <div class="col-span-full">
                        <div class="loading-spinner"></div>
                        <p class="text-center text-gray-400">Carregando lan houses...</p>
                    </div>
                `;
                
                // Construir URL com parâmetros
                let url = `${API_BASE_URL}/lanhouses`;
                const params = new URLSearchParams();
                
                if (filters.tipo && filters.tipo !== '') {
                    params.append('tipo', filters.tipo);
                }
                if (filters.precoMinimo && filters.precoMinimo !== '0') {
                    params.append('precoMinimo', filters.precoMinimo);
                }
                if (filters.precoMaximo && filters.precoMaximo !== '999') {
                    params.append('precoMaximo', filters.precoMaximo);
                }
                
                if (params.toString()) {
                    url += `?${params.toString()}`;
                }
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Erro ao carregar lan houses');
                const data = await response.json();
                
                lanHousesData = data.lan_houses;
                
                // Aplicar filtros adicionais que não são suportados diretamente pela API (estado/cidade)
                let filteredData = [...lanHousesData];
                
                // Filtrar por estado (localmente, pois a API não tem esse filtro diretamente)
                if (filters.estadoId && filters.estadoId !== '') {
                    // Nota: A tabela lanHouse precisa ter campos localidadeEstado e localidadeCidade
                    // Como não temos esses campos no mock da API, vamos usar o nome do usuário para demonstração
                    // Em produção, ajuste conforme sua estrutura de banco de dados
                    filteredData = filteredData.filter(lh => {
                        // Placeholder: como a API atual não tem estado/cidade na lanHouse,
                        // vamos manter todos. Em produção, adicione esses campos à tabela.
                        return true;
                    });
                }
                
                renderGrid(filteredData);
            } catch (error) {
                console.error('Erro ao carregar lan houses:', error);
                showError('Erro ao carregar lan houses. Verifique se a API está rodando.');
            }
        }

        // Helper: Mostrar mensagem de erro
        function showError(message) {
            const gridContainer = document.getElementById('lanHousesGrid');
            gridContainer.innerHTML = `
                <div class="col-span-full">
                    <div class="error-message">
                        <p>❌ ${message}</p>
                        <button onclick="location.reload()" class="mt-3 bg-[#2c1810] hover:bg-[#4a2c1c] text-white px-4 py-2 rounded-lg transition">
                            Tentar novamente
                        </button>
                    </div>
                </div>
            `;
        }

        // Render grid with filtered results
        function renderGrid(lanHouses) {
            const gridContainer = document.getElementById('lanHousesGrid');
            const countSpan = document.getElementById('resultsCount');
            countSpan.innerText = `${lanHouses.length} estabelecimento${lanHouses.length !== 1 ? 's' : ''}`;

            if (lanHouses.length === 0) {
                gridContainer.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12 bg-[#0f0f0f] rounded-xl">Nenhuma lan house encontrada com os filtros selecionados.</div>`;
                return;
            }

            gridContainer.innerHTML = lanHouses.map(lh => `
                <div class="bg-[#111111] rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col border border-[#2a2a2a]">
                    <img src="${lh.foto || 'https://picsum.photos/id/1/400/300'}" alt="${lh.nome}" class="card-img w-full h-44 object-cover" onerror="this.src='https://picsum.photos/id/1/400/300'">
                    <div class="p-4 flex flex-col flex-grow">
                        <h4 class="text-white text-xl font-semibold mb-1">${lh.nome || 'Lan House'}</h4>
                        <p class="text-gray-400 text-sm mb-1">${lh.usuario_nome || 'Proprietário'}</p>
                        <p class="text-gray-400 text-sm mb-2">Tipo: ${getTipoTexto(lh.tipoPublico)}</p>
                        <p class="text-[#c9a87b] text-lg font-bold mb-3">R$ ${lh.preco || 0}/hora</p>
                        <button onclick="window.location.href='vermais.html?type=lanhouse&id=${lh.id}'" class="mt-auto bg-[#2c1810] hover:bg-[#3d2a1e] text-white py-2 rounded-lg transition text-sm font-medium">Ver mais</button>
                    </div>
                </div>
            `).join('');
        }

        // Função para coletar filtros e buscar dados
        async function searchLanHouses() {
            const selectedType = document.getElementById('typeFilter').value;
            const selectedState = document.getElementById('stateFilter').value;
            const selectedCity = document.getElementById('cityFilter').value;
            const minPrice = document.getElementById('priceMin').value;
            const maxPrice = document.getElementById('priceMax').value;
            const selectedDate = document.getElementById('dateFilter').value; // não usado na API por enquanto
            
            const filters = {
                tipo: selectedType !== '' ? parseInt(selectedType) : null,
                precoMinimo: minPrice !== '0' ? parseFloat(minPrice) : null,
                precoMaximo: maxPrice !== '999' ? parseFloat(maxPrice) : null,
                estadoId: selectedState !== '' ? parseInt(selectedState) : null,
                cidadeId: selectedCity !== '' ? parseInt(selectedCity) : null,
                data: selectedDate
            };
            
            await loadLanHouses(filters);
        }

        // URL parameter handling for type filter
        function handleUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const typeParam = urlParams.get('type');
            if (typeParam !== null) {
                const typeSelect = document.getElementById('typeFilter');
                // Mapeamento: 0=pro(1), 1=amador(2), 2=corujao(3), 3=outros(4)
                const mapping = {
                    '0': '1',
                    '1': '2',
                    '2': '3',
                    '3': '4'
                };
                if (mapping[typeParam]) {
                    typeSelect.value = mapping[typeParam];
                }
            }
        }

        // Event Listeners
        document.getElementById('searchBtn').addEventListener('click', () => {
            searchLanHouses();
        });

        // Carregar cidades quando o estado mudar
        document.getElementById('stateFilter').addEventListener('change', (e) => {
            const estadoId = e.target.value;
            if (estadoId) {
                loadCidades(parseInt(estadoId));
            } else {
                document.getElementById('cityFilter').innerHTML = '<option value="">Cidade</option>';
            }
            // Opcional: recarregar resultados ao mudar filtro
            // searchLanHouses();
        });

        // Carregar resultados quando outros filtros mudarem (opcional)
        const autoSearchFilters = ['typeFilter', 'priceMin', 'priceMax'];
        autoSearchFilters.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('change', () => searchLanHouses());
        });

        // Inicialização
        async function init() {
            handleUrlParams();
            await loadEstados();
            await searchLanHouses();
        }
        
        init();
    </script>
</body>

</html>
