<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanHouseSystem - Agendar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional custom styles to complement Tailwind and maintain theme */
        body {
            background-color: black;
        }

        .header-hover-shadow {
            transition: text-shadow 0.3s ease, transform 0.3s ease;
        }

        .header-hover-shadow:hover {
            text-shadow: 0 0 8px rgba(255, 215, 175, 0.6);
            transform: scale(1.01);
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1.5px;
            background-color: #c9a87b;
            transition: width 0.25s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #5a3e2e;
            border-radius: 4px;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: none;
            border-color: #c9a87b;
            box-shadow: 0 0 0 2px rgba(201, 168, 123, 0.3);
        }

        /* custom card image aspect */
        .card-img {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>

<body class="bg-black m-0 p-0">
    <header class="h-[30vh] min-h-[160px] w-full bg-[#2c1810] flex items-center px-6 md:px-12 lg:px-20">
        <div class="header-container max-w-7xl mx-auto w-full">
            <h1 class="header-hover-shadow text-white text-3xl sm:text-4xl md:text-5xl tracking-wide cursor-default transition-all duration-300"
                style="font-family: 'Raleway-Light', 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 300;">
                Lan House System
            </h1>
            <nav class="flex gap-6 md:gap-8 items-center">
                <a href="index.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    HOME
                </a>
                <a href="agendar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    AGENDAR
                </a>
                <a href="anunciar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ANUNCIE
                </a>
                <a href="comps.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    COMPS
                </a>
                <a href="login.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ENTRAR
                </a>
            </nav>
        </div>
    </header>

    <!-- Main content: two columns (filter sidebar + results grid) -->
    <main class="max-w-7xl mx-auto px-4 md:px-8 py-12 flex flex-col lg:flex-row gap-8">
        <!-- LEFT SIDEBAR - FILTERS (width: 30vw on large screens, but responsive) -->
        <aside class="w-full lg:w-[30%] bg-[#0c0c0c] rounded-2xl p-6 border border-[#2a2a2a] shadow-xl h-auto">
            <h3 class="text-2xl text-white mb-6 border-l-4 border-[#c9a87b] pl-4"
                style="font-family: 'Rationale-Regular', 'Courier New', monospace;">Filtros</h3>

            <!-- Tipo de agendamento -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Tipo de agendamento</label>
                <select id="typeFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200">
                    <option value="all">Todos os tipos</option>
                    <option value="pro">Times profissionais (+6 pessoas obrigatório)</option>
                    <option value="amador">Times amadores (+5 pessoas obrigatório)</option>
                    <option value="corujao">Amigos para corujão ou jogatinas (+4 pessoas obrigatório)</option>
                    <option value="outros">Outros (Entrar em equipes, Jogar sozinho ou em menos de 4 pessoas)</option>
                </select>
            </div>

            <!-- Data -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Data</label>
                <input type="date" id="dateFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200" value="">
            </div>

            <!-- Região (Estado + Cidade) -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Região</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <select id="stateFilter"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-full sm:w-1/2">
                        <option value="">Estado</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PR">Paraná</option>
                        <option value="RS">Rio Grande do Sul</option>
                    </select>
                    <select id="cityFilter"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-full sm:w-1/2">
                        <option value="">Cidade</option>
                    </select>
                </div>
            </div>

            <!-- Preço (min/max) -->
            <div class="mb-8">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Preço (R$/hora)</label>
                <div class="flex gap-3">
                    <select id="priceMin"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-1/2">
                        <option value="0">Mínimo</option>
                        <option value="5">R$ 5</option>
                        <option value="10">R$ 10</option>
                        <option value="15">R$ 15</option>
                        <option value="20">R$ 20</option>
                        <option value="25">R$ 25</option>
                    </select>
                    <select id="priceMax"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-1/2">
                        <option value="999">Máximo</option>
                        <option value="10">R$ 10</option>
                        <option value="15">R$ 15</option>
                        <option value="20">R$ 20</option>
                        <option value="25">R$ 25</option>
                        <option value="30">R$ 30</option>
                        <option value="50">R$ 50</option>
                    </select>
                </div>
            </div>

            <button id="searchBtn"
                class="w-full bg-[#2c1810] hover:bg-[#4a2c1c] text-white font-semibold py-3 rounded-full transition-all duration-200 shadow-md">Pesquisar</button>
        </aside>

        <!-- RIGHT SIDE - RESULTS GRID -->
        <section class="w-full lg:w-[70%]">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <h3 class="text-2xl text-white" style="font-family: 'Rationale-Regular', 'Courier New', monospace;">Lan
                    houses disponíveis</h3>
                <span id="resultsCount" class="bg-[#2c1810] text-amber-200 px-4 py-1.5 rounded-full text-sm font-bold">0
                    estabelecimentos</span>
            </div>
            <div id="lanHousesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- dynamic cards will appear here -->
            </div>
        </section>
    </main>

    <footer class="w-full bg-[#1e1e1e] h-auto py-12 flex items-center justify-center px-6 text-center">
        <p class="text-gray-400 text-sm md:text-base font-sans tracking-wide">
            UNIFECAF - 2026, TODOS OS DIREITOS RESERVADOS. - PROJETO EXCLUSIVAMENTE DEMONSTRATIVO E ACADÊMICO.
        </p>
    </footer>

    <script>
        // Mock data for lan houses (each object represents an establishment)
        const lanHousesData = [
            { id: 1, name: "Arena Gamer SP", type: "pro", state: "SP", city: "São Paulo", price: 25, image: "https://picsum.photos/id/1/400/300", description: "Estrutura profissional com PCs de alto desempenho." },
            { id: 2, name: "Byte & Battle", type: "amador", state: "SP", city: "Campinas", price: 15, image: "https://picsum.photos/id/2/400/300", description: "Ambiente amigável para times amadores." },
            { id: 3, name: "Noite Gamer", type: "corujao", state: "RJ", city: "Rio de Janeiro", price: 12, image: "https://picsum.photos/id/3/400/300", description: "Corujão com descontos especiais." },
            { id: 4, name: "Solo Leveling", type: "outros", state: "MG", city: "Belo Horizonte", price: 10, image: "https://picsum.photos/id/4/400/300", description: "Perfeito para quem joga sozinho ou em dupla." },
            { id: 5, name: "Team Pro House", type: "pro", state: "SP", city: "São Paulo", price: 30, image: "https://picsum.photos/id/5/400/300", description: "Treinamentos profissionais e equipamentos top." },
            { id: 6, name: "Amigos Play", type: "corujao", state: "PR", city: "Curitiba", price: 14, image: "https://picsum.photos/id/6/400/300", description: "Ideal para grupos de amigos." },
            { id: 7, name: "Clã Arena", type: "amador", state: "RS", city: "Porto Alegre", price: 18, image: "https://picsum.photos/id/7/400/300", description: "Torneios amadores toda semana." },
            { id: 8, name: "Free Agents Hub", type: "outros", state: "SP", city: "Santos", price: 8, image: "https://picsum.photos/id/8/400/300", description: "Espaço para encontrar equipes e jogar." },
            { id: 9, name: "Night Owls", type: "corujao", state: "RJ", city: "Niterói", price: 10, image: "https://picsum.photos/id/9/400/300", description: "Corujão até o amanhecer." },
            { id: 10, name: "Elite Gaming", type: "pro", state: "MG", city: "Uberlândia", price: 28, image: "https://picsum.photos/id/10/400/300", description: "Equipamentos de competição." },
            { id: 11, name: "Lan House Central", type: "amador", state: "PR", city: "Londrina", price: 12, image: "https://picsum.photos/id/11/400/300", description: "Ambiente familiar e descontos para grupos." },
            { id: 12, name: "Solo Station", type: "outros", state: "RS", city: "Caxias do Sul", price: 9, image: "https://picsum.photos/id/12/400/300", description: "Estaçõs individuais para jogadores casuais." }
        ];

        // Helper: populate city dropdown based on selected state
        const stateSelect = document.getElementById('stateFilter');
        const citySelect = document.getElementById('cityFilter');
        const citiesByState = {
            SP: ['São Paulo', 'Campinas', 'Santos', 'Ribeirão Preto'],
            RJ: ['Rio de Janeiro', 'Niterói', 'Petrópolis'],
            MG: ['Belo Horizonte', 'Uberlândia', 'Contagem'],
            PR: ['Curitiba', 'Londrina', 'Maringá'],
            RS: ['Porto Alegre', 'Caxias do Sul', 'Pelotas']
        };

        function updateCities() {
            const selectedState = stateSelect.value;
            citySelect.innerHTML = '<option value="">Cidade</option>';
            if (selectedState && citiesByState[selectedState]) {
                citiesByState[selectedState].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }
        stateSelect.addEventListener('change', updateCities);
        updateCities(); // initial call

        // URL parameter handling for type filter (?type=0,1,2,3)
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');
        if (typeParam !== null) {
            const typeSelect = document.getElementById('typeFilter');
            const mapping = {
                '0': 'pro',
                '1': 'amador',
                '2': 'corujao',
                '3': 'outros'
            };
            if (mapping[typeParam]) {
                typeSelect.value = mapping[typeParam];
            }
        }

        // Function to filter lan houses based on selected filters
        function filterLanHouses() {
            const selectedType = document.getElementById('typeFilter').value;
            const selectedDate = document.getElementById('dateFilter').value; // not used in mock but kept for future
            const selectedState = stateSelect.value;
            const selectedCity = citySelect.value;
            const minPrice = parseInt(document.getElementById('priceMin').value) || 0;
            const maxPrice = parseInt(document.getElementById('priceMax').value) || 999;

            return lanHousesData.filter(lh => {
                // Type filter
                if (selectedType !== 'all' && lh.type !== selectedType) return false;
                // State filter
                if (selectedState && lh.state !== selectedState) return false;
                // City filter
                if (selectedCity && lh.city !== selectedCity) return false;
                // Price range
                if (lh.price < minPrice || lh.price > maxPrice) return false;
                return true;
            });
        }

        // Render grid with filtered results
        function renderGrid() {
            const filtered = filterLanHouses();
            const gridContainer = document.getElementById('lanHousesGrid');
            const countSpan = document.getElementById('resultsCount');
            countSpan.innerText = `${filtered.length} estabelecimento${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                gridContainer.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12 bg-[#0f0f0f] rounded-xl">Nenhuma lan house encontrada com os filtros selecionados.</div>`;
                return;
            }

            gridContainer.innerHTML = filtered.map(lh => `
                <div class="bg-[#111111] rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col border border-[#2a2a2a]">
                    <img src="${lh.image}" alt="${lh.name}" class="card-img w-full h-44 object-cover">
                    <div class="p-4 flex flex-col flex-grow">
                        <h4 class="text-white text-xl font-semibold mb-1">${lh.name}</h4>
                        <p class="text-gray-400 text-sm mb-2">${lh.city}, ${lh.state}</p>
                        <p class="text-[#c9a87b] text-lg font-bold mb-3">R$ ${lh.price}/hora</p>
                        <button onclick="window.location.href='vermais.html?type=lanhouse&id=1'" class="mt-auto bg-[#2c1810] hover:bg-[#3d2a1e] text-white py-2 rounded-lg transition text-sm font-medium">Ver mais</button>
                    </div>
                </div>
            `).join('');
        }

        // Search button click
        document.getElementById('searchBtn').addEventListener('click', () => {
            renderGrid();
        });

        // Also trigger filter when any select changes (optional)
        const filters = ['typeFilter', 'dateFilter', 'stateFilter', 'cityFilter', 'priceMin', 'priceMax'];
        filters.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('change', () => renderGrid());
        });

        // Initial render
        renderGrid();
    </script>
</body>

</html>
