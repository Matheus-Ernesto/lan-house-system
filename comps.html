<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanHouseSystem - Campeonatos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional custom styles to complement Tailwind and maintain theme */
        body {
            background-color: black;
        }

        .header-hover-shadow {
            transition: text-shadow 0.3s ease, transform 0.3s ease;
        }

        .header-hover-shadow:hover {
            text-shadow: 0 0 8px rgba(255, 215, 175, 0.6);
            transform: scale(1.01);
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1.5px;
            background-color: #c9a87b;
            transition: width 0.25s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #5a3e2e;
            border-radius: 4px;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: none;
            border-color: #c9a87b;
            box-shadow: 0 0 0 2px rgba(201, 168, 123, 0.3);
        }

        /* custom card image aspect */
        .card-img {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>

<body class="bg-black m-0 p-0">
    <header class="h-[30vh] min-h-[160px] w-full bg-[#2c1810] flex items-center px-6 md:px-12 lg:px-20">
        <div class="header-container max-w-7xl mx-auto w-full">
            <h1 class="header-hover-shadow text-white text-3xl sm:text-4xl md:text-5xl tracking-wide cursor-default transition-all duration-300"
                style="font-family: 'Raleway-Light', 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 300;">
                Lan House System
            </h1>
            <nav class="flex gap-6 md:gap-8 items-center">
                <a href="index.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    HOME
                </a>
                <a href="agendar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    AGENDAR
                </a>
                <a href="anunciar.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ANUNCIE
                </a>
                <a href="comps.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    COMPS
                </a>
                <a href="login.html"
                    class="nav-link text-gray-200 hover:text-white text-base sm:text-lg transition-colors duration-200"
                    style="font-family: 'Rationale-Regular', 'Courier New', monospace; letter-spacing: 0.02em;">
                    ENTRAR
                </a>
            </nav>
        </div>
    </header>

    <!-- Main content: two columns (filter sidebar + results grid) -->
    <main class="max-w-7xl mx-auto px-4 md:px-8 py-12 flex flex-col lg:flex-row gap-8">
        <!-- LEFT SIDEBAR - FILTERS -->
        <aside class="w-full lg:w-[30%] bg-[#0c0c0c] rounded-2xl p-6 border border-[#2a2a2a] shadow-xl h-auto">
            <h3 class="text-2xl text-white mb-6 border-l-4 border-[#c9a87b] pl-4"
                style="font-family: 'Rationale-Regular', 'Courier New', monospace;">Filtros</h3>

            <!-- Tipo de campeonato -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Tipo de campeonato</label>
                <select id="typeFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200">
                    <option value="all">Todos os tipos</option>
                    <option value="pro">Pro Nacional</option>
                    <option value="regional">Regional</option>
                    <option value="online">Online</option>
                </select>
            </div>

            <!-- Jogo -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Jogo</label>
                <select id="gameFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200">
                    <option value="all">Todos os jogos</option>
                    <option value="CS2">Counter-Strike 2</option>
                    <option value="Valorant">Valorant</option>
                    <option value="LOL">League of Legends</option>
                    <option value="Dota2">Dota 2</option>
                    <option value="Fortnite">Fortnite</option>
                </select>
            </div>

            <!-- Data (a partir de) -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Data (a partir de)</label>
                <input type="date" id="dateFilter"
                    class="w-full bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200">
            </div>

            <!-- Região (Estado + Cidade) -->
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Região</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <select id="stateFilter"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-full sm:w-1/2">
                        <option value="">Estado</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PR">Paraná</option>
                        <option value="RS">Rio Grande do Sul</option>
                    </select>
                    <select id="cityFilter"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-full sm:w-1/2">
                        <option value="">Cidade</option>
                    </select>
                </div>
            </div>

            <!-- Prêmio (min/max) -->
            <div class="mb-8">
                <label class="block text-gray-300 mb-2 text-sm font-semibold tracking-wide">Prêmio (R$)</label>
                <div class="flex gap-3">
                    <select id="prizeMin"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-1/2">
                        <option value="0">Mínimo</option>
                        <option value="100">R$ 100</option>
                        <option value="500">R$ 500</option>
                        <option value="1000">R$ 1.000</option>
                        <option value="5000">R$ 5.000</option>
                    </select>
                    <select id="prizeMax"
                        class="bg-[#1a1a1a] border border-[#3a2a20] rounded-lg px-4 py-2.5 text-gray-200 w-1/2">
                        <option value="999999">Máximo</option>
                        <option value="500">R$ 500</option>
                        <option value="1000">R$ 1.000</option>
                        <option value="5000">R$ 5.000</option>
                        <option value="10000">R$ 10.000</option>
                    </select>
                </div>
            </div>

            <button id="searchBtn"
                class="w-full bg-[#2c1810] hover:bg-[#4a2c1c] text-white font-semibold py-3 rounded-full transition-all duration-200 shadow-md">Pesquisar</button>
        </aside>

        <!-- RIGHT SIDE - RESULTS GRID -->
        <section class="w-full lg:w-[70%]">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <h3 class="text-2xl text-white" style="font-family: 'Rationale-Regular', 'Courier New', monospace;">Campeonatos disponíveis</h3>
                <span id="resultsCount" class="bg-[#2c1810] text-amber-200 px-4 py-1.5 rounded-full text-sm font-bold">0 campeonatos</span>
            </div>
            <div id="championshipsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- dynamic cards will appear here -->
            </div>
        </section>
    </main>

    <footer class="w-full bg-[#1e1e1e] h-auto py-12 flex items-center justify-center px-6 text-center">
        <p class="text-gray-400 text-sm md:text-base font-sans tracking-wide">
            UNIFECAF - 2026, TODOS OS DIREITOS RESERVADOS. - PROJETO EXCLUSIVAMENTE DEMONSTRATIVO E ACADÊMICO.
        </p>
    </footer>

    <script>
        // Mock data for championships
        const championshipsData = [
            { id: 1, name: "Liga Paulista de CS2", type: "regional", game: "CS2", state: "SP", city: "São Paulo", date: "2025-05-15", prize: 5000, image: "https://picsum.photos/id/15/400/300", description: "Campeonato regional com grandes premiações." },
            { id: 2, name: "Valorant Pro Series", type: "pro", game: "Valorant", state: "SP", city: "Campinas", date: "2025-06-01", prize: 10000, image: "https://picsum.photos/id/16/400/300", description: "Circuito profissional nacional." },
            { id: 3, name: "LOL Cup Online", type: "online", game: "LOL", state: "", city: "", date: "2025-05-20", prize: 2000, image: "https://picsum.photos/id/17/400/300", description: "Torneio online aberto para todos." },
            { id: 4, name: "Dota 2 Masters", type: "pro", game: "Dota2", state: "RJ", city: "Rio de Janeiro", date: "2025-07-10", prize: 15000, image: "https://picsum.photos/id/18/400/300", description: "Evento presencial no Rio." },
            { id: 5, name: "Fortnite Solo Showdown", type: "online", game: "Fortnite", state: "", city: "", date: "2025-05-25", prize: 3000, image: "https://picsum.photos/id/19/400/300", description: "Batalha solo com prêmios." },
            { id: 6, name: "Campeonato Sul de Valorant", type: "regional", game: "Valorant", state: "RS", city: "Porto Alegre", date: "2025-08-05", prize: 4000, image: "https://picsum.photos/id/20/400/300", description: "Região sul em destaque." },
            { id: 7, name: "CS2 Amador Cup", type: "regional", game: "CS2", state: "MG", city: "Belo Horizonte", date: "2025-06-15", prize: 1500, image: "https://picsum.photos/id/21/400/300", description: "Para times amadores." }
        ];

        // Helper: populate city dropdown based on selected state
        const stateSelect = document.getElementById('stateFilter');
        const citySelect = document.getElementById('cityFilter');
        const citiesByState = {
            SP: ['São Paulo', 'Campinas', 'Santos', 'Ribeirão Preto'],
            RJ: ['Rio de Janeiro', 'Niterói', 'Petrópolis'],
            MG: ['Belo Horizonte', 'Uberlândia', 'Contagem'],
            PR: ['Curitiba', 'Londrina', 'Maringá'],
            RS: ['Porto Alegre', 'Caxias do Sul', 'Pelotas']
        };

        function updateCities() {
            const selectedState = stateSelect.value;
            citySelect.innerHTML = '<option value="">Cidade</option>';
            if (selectedState && citiesByState[selectedState]) {
                citiesByState[selectedState].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }
        stateSelect.addEventListener('change', updateCities);
        updateCities();

        // Filter function
        function filterChampionships() {
            const type = document.getElementById('typeFilter').value;
            const game = document.getElementById('gameFilter').value;
            const date = document.getElementById('dateFilter').value;
            const state = stateSelect.value;
            const city = citySelect.value;
            const minPrize = parseInt(document.getElementById('prizeMin').value) || 0;
            const maxPrize = parseInt(document.getElementById('prizeMax').value) || 999999;

            return championshipsData.filter(champ => {
                if (type !== 'all' && champ.type !== type) return false;
                if (game !== 'all' && champ.game !== game) return false;
                if (date && champ.date < date) return false;
                if (state && champ.state !== state) return false;
                if (city && champ.city !== city) return false;
                if (champ.prize < minPrize || champ.prize > maxPrize) return false;
                return true;
            });
        }

        // Render grid
        function renderGrid() {
            const filtered = filterChampionships();
            const gridContainer = document.getElementById('championshipsGrid');
            const countSpan = document.getElementById('resultsCount');
            countSpan.innerText = `${filtered.length} campeonato${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                gridContainer.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12 bg-[#0f0f0f] rounded-xl">Nenhum campeonato encontrado com os filtros selecionados.</div>`;
                return;
            }

            gridContainer.innerHTML = filtered.map(champ => `
                <div class="bg-[#111111] rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col border border-[#2a2a2a]">
                    <img src="${champ.image}" alt="${champ.name}" class="card-img w-full h-44 object-cover">
                    <div class="p-4 flex flex-col flex-grow">
                        <h4 class="text-white text-xl font-semibold mb-1">${champ.name}</h4>
                        <p class="text-gray-400 text-sm mb-2">${champ.game} • ${champ.type === 'pro' ? 'Pro Nacional' : (champ.type === 'regional' ? 'Regional' : 'Online')}</p>
                        <p class="text-gray-400 text-sm mb-1">${champ.city ? `${champ.city}, ${champ.state}` : (champ.state ? champ.state : 'Online')}</p>
                        <p class="text-[#c9a87b] text-lg font-bold mb-2">Prêmio: R$ ${champ.prize.toLocaleString()}</p>
                        <p class="text-gray-500 text-xs mb-3">Data: ${new Date(champ.date).toLocaleDateString('pt-BR')}</p>
                        <button onclick="alert('Funcionalidade em desenvolvimento. Campeonato: ${champ.name.replace(/'/g, "\\'")}')" class="mt-auto bg-[#2c1810] hover:bg-[#3d2a1e] text-white py-2 rounded-lg transition text-sm font-medium">Ver mais</button>
                    </div>
                </div>
            `).join('');
        }

        // Search button click
        document.getElementById('searchBtn').addEventListener('click', () => {
            renderGrid();
        });

        // Trigger filter on any select/input change
        const filters = ['typeFilter', 'gameFilter', 'dateFilter', 'stateFilter', 'cityFilter', 'prizeMin', 'prizeMax'];
        filters.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('change', () => renderGrid());
        });

        // Initial render
        renderGrid();
    </script>
</body>

</html>
